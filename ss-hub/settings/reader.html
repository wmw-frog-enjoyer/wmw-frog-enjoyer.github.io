<!doctype html>
<html>
    <head>
        <title>Ansilian</title>
        <link
            rel="icon"
            type="image/png"
            href="https://wmw-frog-enjoyer.github.io/assets/ansilian.png"
        />
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link
            href="https://fonts.googleapis.com/css2?family=Inter+Tight:ital,wght@0,100..900;1,100..900&family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Noto+Naskh+Arabic:wght@400..700&display=swap"
            rel="stylesheet"
        />
        <link rel="stylesheet" href="../../style.css" />
        <link rel="stylesheet" href="style.css" />
    </head>
    <body>
        <!-- ===================== COPY-PASTE HEADER ===================== -->
        <div id="topbar-container"></div>
        <script>
            fetch("/topbar.html")
                .then((r) => r.text())
                .then((html) => {
                    document.getElementById("topbar-container").innerHTML =
                        html;
                });
        </script>
        <!-- ==================== END COPY-PASTE HEADER ================== -->

        <div class="page-content">
            <a class="back-link" href="index.html">← back to settings</a>

            <div class="post-preface">
                <div class="preface-left">
                    <span class="preface-number" id="preface-number"></span>
                    <span class="format-badge" id="preface-format"></span>
                </div>
                <div class="preface-right">
                    <span class="preface-author" id="preface-author"></span>
                    <span class="preface-date" id="preface-date"></span>
                </div>
            </div>
            <hr class="preface-divider" />

            <div id="preface-tags" class="preface-tags"></div>

            <div id="stats-grid" class="stats-grid"></div>

            <div
                id="video-container"
                class="video-container"
                style="display: none"
            >
                <iframe
                    id="video-embed"
                    class="video-embed"
                    frameborder="0"
                    allow="
                        accelerometer;
                        autoplay;
                        clipboard-write;
                        encrypted-media;
                        gyroscope;
                        picture-in-picture;
                    "
                    allowfullscreen
                ></iframe>
            </div>

            <!-- copy or download button, shown after the video -->
            <div id="action-container"></div>

            <p class="status-text" id="status"></p>
        </div>

        <script>
            const SS_FIELDS = [
                { key: "ApproachRate", label: "Approach Rate" },
                { key: "ApproachDistance", label: "Approach Distance" },
                { key: "FadeInLength", label: "Fade In Length" },
                { key: "Parallax", label: "Camera Parallax" },
            ];

            const SSP_FIELDS = [
                { key: "approach_rate", label: "Approach Rate" },
                { key: "spawn_distance", label: "Spawn Distance" },
                { key: "fade_length", label: "Fade In Length" },
                { key: "parallax", label: "Parallax" },
                { key: "grid_parallax", label: "Grid Parallax" },
                { key: "ui_parallax", label: "UI Parallax" },
            ];

            function getYouTubeEmbedUrl(url) {
                if (!url) return null;
                const match = url.match(/(?:youtu\.be\/|[?&]v=)([\w-]{11})/);
                return match
                    ? `https://www.youtube.com/embed/${match[1]}`
                    : null;
            }

            function renderStats(data, fields) {
                const grid = document.getElementById("stats-grid");
                grid.innerHTML = "";
                fields.forEach(({ key, label }) => {
                    const value = data[key];
                    if (value === undefined || value === null) return;
                    const box = document.createElement("div");
                    box.className = "stat-box";
                    box.innerHTML = `
                        <div class="stat-label">${label}</div>
                        <div class="stat-value">${value}</div>
                    `;
                    grid.appendChild(box);
                });
            }

            function addCopyButton(configData) {
                const btn = document.createElement("button");
                btn.className = "action-btn";
                btn.textContent = "copy config";
                btn.addEventListener("click", () => {
                    // copies the raw JSON text to the clipboard
                    navigator.clipboard
                        .writeText(JSON.stringify(configData, null, 2))
                        .then(() => {
                            btn.textContent = "copied!";
                            setTimeout(
                                () => (btn.textContent = "copy config"),
                                2000,
                            );
                        })
                        .catch(() => {
                            btn.textContent = "copy failed";
                            setTimeout(
                                () => (btn.textContent = "copy config"),
                                2000,
                            );
                        });
                });
                document.getElementById("action-container").appendChild(btn);
            }

            function addDownloadButton(configData, author) {
                const btn = document.createElement("button");
                btn.className = "action-btn";
                btn.textContent = "download config";
                btn.addEventListener("click", () => {
                    // creates a temporary download link and clicks it
                    const blob = new Blob(
                        [JSON.stringify(configData, null, 2)],
                        { type: "application/json" },
                    );
                    const url = URL.createObjectURL(blob);
                    const a = document.createElement("a");
                    a.href = url;
                    a.download = `${author}-ssp-settings.json`;
                    a.click();
                    URL.revokeObjectURL(url);
                });
                document.getElementById("action-container").appendChild(btn);
            }

            async function loadConfig() {
                const status = document.getElementById("status");
                const params = new URLSearchParams(window.location.search);
                const configId = params.get("config");

                if (!configId) {
                    status.textContent = "no config specified.";
                    return;
                }

                try {
                    const indexResponse = await fetch("configs/index.json");
                    const allConfigs = await indexResponse.json();
                    const meta = allConfigs.find((c) => c.id === configId);

                    if (!meta) {
                        status.textContent = "config not found.";
                        return;
                    }

                    document.getElementById("preface-number").textContent =
                        `#${meta.id}`;
                    document.getElementById("preface-author").textContent =
                        meta.author;
                    document.getElementById("preface-date").textContent =
                        meta.date;
                    document.title = `${meta.title || meta.author} — Ansilian`;

                    const formatBadge =
                        document.getElementById("preface-format");
                    formatBadge.textContent = meta.format;
                    formatBadge.className = `format-badge format-${meta.format}`;

                    if (meta.tags && meta.tags.length > 0) {
                        document.getElementById("preface-tags").innerHTML =
                            meta.tags
                                .map(
                                    (t) =>
                                        `<span class="preface-tag">${t}</span>`,
                                )
                                .join("");
                    }

                    const configResponse = await fetch(
                        `configs/${configId}.json`,
                    );
                    if (!configResponse.ok) {
                        status.textContent = "settings file not found.";
                        return;
                    }
                    const configData = await configResponse.json();

                    const fields =
                        meta.format === "ssp" ? SSP_FIELDS : SS_FIELDS;
                    renderStats(configData, fields);

                    if (meta.video) {
                        const embedUrl = getYouTubeEmbedUrl(meta.video);
                        if (embedUrl) {
                            document.getElementById("video-embed").src =
                                embedUrl;
                            document.getElementById(
                                "video-container",
                            ).style.display = "block";
                        }
                    }

                    // ss → copy button, ssp → download button
                    if (meta.format === "ss") {
                        addCopyButton(configData);
                    } else if (meta.format === "ssp") {
                        addDownloadButton(configData, meta.author);
                    }
                } catch (error) {
                    status.textContent = "could not load config.";
                    console.error(error);
                }
            }

            loadConfig();
        </script>
    </body>
</html>
