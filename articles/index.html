<!doctype html>
<html>
    <head>
        <title>articles — Ansilian</title>
        <link
            rel="icon"
            type="image/png"
            href="https://wmw-frog-enjoyer.github.io/assets/ansilian.png"
        />
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link
            href="https://fonts.googleapis.com/css2?family=Inter+Tight:ital,wght@0,100..900;1,100..900&family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Noto+Naskh+Arabic:wght@400..700&display=swap"
            rel="stylesheet"
        />
        <link rel="stylesheet" href="../style.css" />
        <link rel="stylesheet" href="style.css" />
    </head>
    <body>
        <!-- ===================== COPY-PASTE HEADER ===================== -->
        <header class="topbar">
            <a class="home-button" href="https://wmw-frog-enjoyer.github.io/">
                <img
                    class="home-logo"
                    src="https://wmw-frog-enjoyer.github.io/assets/ansilian.png"
                    alt="home-Logo"
                />
                <span>Ansilian</span>
            </a>
            <div class="center-nav">
                <a
                    class="archivers"
                    href="https://wmw-frog-enjoyer.github.io/archivers"
                >
                    archivers
                </a>
            </div>
        </header>
        <!-- ==================== END COPY-PASTE HEADER ================== -->

        <div class="page-content">
            <h1 class="page-title">articles</h1>
            <input
                type="text"
                id="search-input"
                class="search-input"
                placeholder="search by title or author..."
                autocomplete="off"
            />
            <div id="posts-container">
                <p class="status-text">loading...</p>
            </div>
        </div>

        <script>
            let allPosts = [];

            function renderCards(filter) {
                const container = document.getElementById("posts-container");
                const query = filter.toLowerCase().trim();

                // filter posts by title or author
                const results = query
                    ? allPosts.filter(
                          (p) =>
                              p.title.toLowerCase().includes(query) ||
                              p.author.toLowerCase().includes(query),
                      )
                    : allPosts;

                container.innerHTML = "";

                if (results.length === 0) {
                    container.innerHTML =
                        '<p class="status-text">no articles found.</p>';
                    return;
                }

                results.forEach((post) => {
                    const card = document.createElement("a");
                    card.className = "post-card";
                    card.href = `reader.html?post=${post.id}`;

                    card.innerHTML = `
                        <div class="card-top-row">
                            <span class="card-number">#${post.id}</span>
                            <span class="card-dot">·</span>
                            <span class="card-date">${post.date}</span>
                        </div>
                        <div class="card-title">${post.title}</div>
                        ${post.description ? `<div class="card-desc">${post.description}</div>` : ""}
                        <div class="card-author">${post.author}</div>
                    `;

                    container.appendChild(card);
                });
            }

            async function loadPosts() {
                const container = document.getElementById("posts-container");

                try {
                    const response = await fetch("posts/posts.json");
                    allPosts = await response.json();

                    if (allPosts.length === 0) {
                        container.innerHTML =
                            '<p class="status-text">nothing here yet.</p>';
                        return;
                    }

                    // sort by id number, highest (newest) first
                    allPosts.sort((a, b) => Number(b.id) - Number(a.id));

                    // render all posts on load
                    renderCards("");

                    // re-render filtered results as the user types
                    document
                        .getElementById("search-input")
                        .addEventListener("input", (e) => {
                            renderCards(e.target.value);
                        });
                } catch (error) {
                    container.innerHTML =
                        '<p class="status-text">could not load articles.</p>';
                    console.error(error);
                }
            }

            loadPosts();
        </script>
    </body>
</html>
