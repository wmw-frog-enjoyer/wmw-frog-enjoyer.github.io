<!doctype html>
<html>
    <head>
        <title>Ansilian</title>
        <link rel="icon" type="image/png" href="/assets/ansilian.png" />
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link
            href="https://fonts.googleapis.com/css2?family=Inter+Tight:ital,wght@0,100..900;1,100..900&family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Noto+Naskh+Arabic:wght@400..700&display=swap"
            rel="stylesheet"
        />
        <link rel="stylesheet" href="../style.css" />
        <link rel="stylesheet" href="style.css" />

        <!-- marked.js converts .md files into HTML -->
        <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/9.1.6/marked.min.js"></script>
    </head>
    <body>
        <!-- ===================== COPY-PASTE HEADER ===================== -->
        <div id="topbar-container"></div>
        <script src="/nav.js"></script>
        <!-- ==================== END COPY-PASTE HEADER ================== -->

        <div class="page-content">
            <a class="back-link" href="index.html">← back to articles</a>

            <div class="post-preface">
                <span class="preface-number" id="preface-number"></span>
                <div class="preface-right">
                    <span class="preface-author" id="preface-author"></span>
                    <span class="preface-date" id="preface-date"></span>
                </div>
            </div>
            <hr class="preface-divider" />

            <!-- tags shown between the preface and the article body -->
            <div id="preface-tags" class="preface-tags"></div>

            <div id="post-body" class="post-body">
                <p class="status-text">loading...</p>
            </div>
        </div>

        <script>
            async function loadPost() {
                const postBody = document.getElementById("post-body");

                const params = new URLSearchParams(window.location.search);
                const postId = params.get("post");

                if (!postId) {
                    postBody.innerHTML =
                        '<p class="status-text">no article specified.</p>';
                    return;
                }

                try {
                    const metaResponse = await fetch("posts/posts.json");
                    const allPosts = await metaResponse.json();
                    const meta = allPosts.find((p) => p.id === postId);

                    if (meta) {
                        document.getElementById("preface-number").textContent =
                            `#${meta.id}`;
                        document.getElementById("preface-author").textContent =
                            meta.author;
                        document.getElementById("preface-date").textContent =
                            meta.date;
                        document.title = `${meta.title} — Ansilian`;

                        // render tags if any
                        if (meta.tags && meta.tags.length > 0) {
                            document.getElementById("preface-tags").innerHTML =
                                meta.tags
                                    .map(
                                        (t) =>
                                            `<span class="preface-tag">${t}</span>`,
                                    )
                                    .join("");
                        }
                    }

                    const mdResponse = await fetch(`posts/${postId}.md`);

                    if (!mdResponse.ok) {
                        postBody.innerHTML =
                            '<p class="status-text">article not found.</p>';
                        return;
                    }

                    const markdown = await mdResponse.text();
                    const processed = markdown.replace(
                        /([^\n])\n([^\n])/g,
                        "$1  \n$2",
                    );
                    postBody.innerHTML = marked.parse(processed);
                } catch (error) {
                    postBody.innerHTML =
                        '<p class="status-text">could not load article.</p>';
                    console.error(error);
                }
            }

            loadPost();
        </script>
    </body>
</html>
